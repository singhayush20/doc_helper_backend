spring:
  config:
    import:
      - optional:file:.env[.properties]
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 1
          time-between-eviction-runs: 60000
    mongodb:
      uri: ${MONGO_URL}

  datasource:
    url: ${DB_CONNECTION_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": false # Keep SQL logs compact when SQL logging is enabled
        # "[trace_level]": OFF # Disable parameter logging at Hibernate level

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
      chat:
        # Chat can use an OpenAI-compatible Ollama endpoint independently from embeddings.
        api-key: ${OPENAI_CHAT_API_KEY:${OLLAMA_API_KEY:ollama}}
        base-url: ${OPENAI_CHAT_BASE_URL:${OLLAMA_BASE_URL:http://localhost:11434}}
        options:
          model: ${OPENAI_CHAT_DEFAULT_MODEL:gpt-oss}
          stream-usage: true
      embedding:
        # Keep embeddings on Gemini/OpenAI-compatible endpoint to preserve vector dimensions.
        api-key: ${OPENAI_EMBEDDING_API_KEY:${OPENAI_API_KEY}}
        base-url: ${OPENAI_EMBEDDING_BASE_URL:${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}}
        options:
          model: ${OPENAI_EMBEDDING_MODEL:gemini-embedding-001}
          dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:1536}

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

doc-chat:
  model: gpt-oss
  temperature: 0.2

summarizer:
  model: qwen2.5:3b-instruct

doc-summary:
  model: qwen2.5:7b-instruct
  chunk:
    model: qwen2.5:3b-instruct
  aggregate:
    model: qwen2.5:3b-instruct
  merge:
    group-size: 4
  retry:
    max-retries: 2
    base-delay-ms: 300
    max-delay-ms: 4000
  temperature: 0.2

web:
  search:
    base-url: ${WEB_SEARCH_BASE_URL}
    api-key: ${WEB_SEARCH_API_KEY}
    timeout-seconds: 10
    default-max-results: 2

logging:
  level:
    root: INFO

    # Your application code
    com.ayushsingh: DEBUG

    # Third-party — suppress noise
    org.springframework: WARN
    org.apache: WARN
    org.hibernate: WARN
    org.mongodb.driver: WARN
    ch.qos.logback: WARN
    net.logstash: WARN
    io.lettuce.core: WARN
    com.p6spy: OFF
    org.hibernate.orm.jdbc.bind: OFF

    # Exceptions — specific loggers that need a different level than their parent
    org.springframework.web.servlet.mvc.method.annotation.ReactiveTypeHandler: INFO
    org.springframework.data.mongodb.core.MongoTemplate: INFO
    org.springframework.mail: INFO
server:
  port: 8086

storage:
  location: uploads

monetization:
  billing:
    billing-timezone: Asia/Kolkata
    default-monthly-limit: 600000
    currency: INR
  model-costs:
    models:
      gemini-embedding-001:
        input-cost-per1k: 0.0001
        output-cost-per1k: 0.0
      default:
        input-cost-per1k: 0.01
        output-cost-per1k: 0.00
  plans:
    FREE:
      monthly-token-limit: 600000
      max-documents: 10
    PRO:
      monthly-token-limit: 1000000
      max-documents: 100

payment:
  gateway:
    secret-key: ${RAZORPAY_KEY_SECRET}
    key-id: ${RAZORPAY_KEY_ID}
    subscription-webhook-secret: ${SUBSCRIPTION_EVENT_WEBHOOK_SECRET}


